body:
  text: 題羅漢尊號碑鑑十先大夫玄期公之生也先贈君宇培公實夢明水懷忠大溈如晦玉泉道素三高僧投宿遂以如晦命為小字長而奇慧里有聖童之目年十二曾王父刺史公以侍養歸携過舍旁竹林廟廟祝乞大士殿柱聯刺史公方吮墨而先大夫遽走別室私作擘窠大書云如來已現光明藏羽客偏持清靜經刺史公驚喜輒用題柱自是益棲心禪學祖父知而禁之不止也未幾刺史公與先贈公相繼捐舘外侮踵至家岌岌且不保遂抑志工舉子業弱冠舉浙闈皈依蓮池大師以明水為別號自是且習為禪誦遊戲書畫竝有絕詣性嗜古圖書彝鼎羅列景玄堂中而精廬古寺殘碑斷碣無不搜集尤性之所躭云五上春官報罷至已未感異夢更名某乃第即玉泉師故名也一日散步燕市遇木里浦真如菴僧售一蠹幀諦視之乃南宋江陰軍乾明院羅漢尊號碑也住世十八尊者石橋五百尊者名號咸備有紹興間葉內翰清臣讚曰覺雄示入滅尊者俱受記現彼聲聞身護茲濁惡世他方自感通此地真靈秘一路指橋西誰明導師意先大夫亟購歸補綴手書一過藏之笥中今二十五年矣客有見而問曰先公既篤信大雄氏此幀奚勿宣傳之予曰先大夫生平不知人間世有剞劂事也初出三冠童子軍超次授餼一戰而中副車再戰而魁賢書既而掇南宮高第未嘗刻一試牘下筆詞賦妙麗頃刻數千言而篋無留稿從未有詩古文辭之刻總以性近嵇嬾冥悟在心不繫區區楮墨間也予且購求良工以先大夫手書者壽之金石廣置名山使覽者得盡識尊者名號生歡喜心而先大夫夙因或亦不致泯沒客姑俟之因備識其顛末如此時崇禎癸未孟夏高承埏敬識于寶坻官舍
